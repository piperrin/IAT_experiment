<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Word and Image Study</title>
  <script src="https://cdn.jsdelivr.net/npm/jspsych@7.3.4/jspsych.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/jspsych@7.3.4/css/jspsych.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-html-keyboard-response@1.1.3/dist/index.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-preload@1.1.3/dist/index.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-survey-likert@1.1.3/dist/index.browser.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/@jspsych/plugin-survey-likert@1.1.3/dist/index.browser.min.css" rel="stylesheet">

  <style>
    body { background: #f5f5f5; }
    .jspsych-content { max-width: 820px; font-family: Arial, sans-serif; font-size: 18px; }

    #iat-box {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 420px;
    }
    #label-bar {
      width: 100%; display: flex;
      justify-content: space-between;
      font-size: 20px; font-weight: bold; margin-bottom: 24px;
    }
    #label-left  { color: #1a5c9e; text-align: left;  width: 45%; }
    #label-right { color: #1a5c9e; text-align: right; width: 45%; }

    #iat-stimulus {
      font-size: 36px; font-weight: bold; color: #222;
      margin: 10px 0 20px 0; min-height: 80px;
      display: flex; align-items: center; justify-content: center;
    }
    #iat-stimulus img {
      max-height: 220px; max-width: 380px;
      border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    #key-reminder { font-size: 15px; color: #555; margin-top: 12px; }
    #error-msg { color: red; font-size: 22px; font-weight: bold; min-height: 32px; margin-top: 8px; }

    .instr-box {
      background: #fff; border-radius: 10px;
      padding: 36px 44px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      line-height: 1.7;
    }
    .instr-box h2 { color: #1a5c9e; margin-top: 0; }
    .key-eg {
      display: inline-block; background: #e8eef7;
      border-radius: 5px; padding: 2px 10px;
      font-weight: bold; font-family: monospace;
    }
  </style>
</head>
<body>
<script>

// ── CONFIGURATION ────────────────────────────────────────────────
const PROLIFIC_REDIRECT = "https://app.prolific.com/submissions/complete?cc=YOUR_CODE_HERE";

const IMAGES = [
  { id:"img_m1", src:"images/mixed_jacket.jpg",   type:"mixed" },
  { id:"img_m2", src:"images/mixed_burger.jpg",   type:"mixed" },
  { id:"img_m3", src:"images/mixed_watch.jpg",    type:"mixed" },
  { id:"img_m4", src:"images/mixed_teacup.jpg",   type:"mixed" },
  { id:"img_m5", src:"images/mixed_bag.jpg",      type:"mixed" },
  { id:"img_n1", src:"images/plain_jacket.jpg",   type:"nonmixed" },
  { id:"img_n2", src:"images/plain_burger.jpg",   type:"nonmixed" },
  { id:"img_n3", src:"images/plain_watch.jpg",    type:"nonmixed" },
  { id:"img_n4", src:"images/plain_teacup.jpg",   type:"nonmixed" },
  { id:"img_n5", src:"images/plain_bag.jpg",      type:"nonmixed" },
];

const WORDS_CYCLIC = [
  { id:"w_c1", text:"cycle"     },
  { id:"w_c2", text:"recurring" },
  { id:"w_c3", text:"recurrent" },
  { id:"w_c4", text:"cyclical"  },
  { id:"w_c5", text:"periodic"  },
];
const WORDS_LINEAR = [
  { id:"w_l1", text:"linear"        },
  { id:"w_l2", text:"chronological" },
  { id:"w_l3", text:"forward"       },
  { id:"w_l4", text:"onward"        },
  { id:"w_l5", text:"sequential"    },
];

const KEY_LEFT  = "e";
const KEY_RIGHT = "i";

// ── HELPERS ──────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function iatScreen(leftTop, leftSub, rightTop, rightSub, stimulus) {
  const isImg = stimulus.src !== undefined;
  const stimHTML = isImg
    ? `<img src="${stimulus.src}" alt="product">`
    : `<span>${stimulus.text}</span>`;
  return `
    <div id="iat-box">
      <div id="label-bar">
        <div id="label-left">
          ${leftTop}<br>
          <small style="font-size:14px;font-weight:normal">${leftSub}</small><br>
          <small style="font-size:13px;color:#888">press <b>${KEY_LEFT.toUpperCase()}</b></small>
        </div>
        <div id="label-right">
          ${rightTop}<br>
          <small style="font-size:14px;font-weight:normal">${rightSub}</small><br>
          <small style="font-size:13px;color:#888">press <b>${KEY_RIGHT.toUpperCase()}</b></small>
        </div>
      </div>
      <div id="iat-stimulus">${stimHTML}</div>
      <div id="error-msg"></div>
      <div id="key-reminder">Respond as fast as you can</div>
    </div>`;
}

function makeTrial(leftTop, leftSub, rightTop, rightSub, stimulus, correctKey, blockNum, trialType) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: iatScreen(leftTop, leftSub, rightTop, rightSub, stimulus),
    choices: [KEY_LEFT, KEY_RIGHT],
    response_ends_trial: false,
    data: { block: blockNum, trial_type_iat: trialType,
            stimulus_id: stimulus.id, correct_key: correctKey,
            is_image: stimulus.src !== undefined },
    on_load: function() {
      const errDiv = document.getElementById("error-msg");
      let done = false;
      const t0 = performance.now();
      function handler(e) {
        const k = e.key.toLowerCase();
        if (k !== KEY_LEFT && k !== KEY_RIGHT) return;
        if (done) return;
        const rt = performance.now() - t0;
        if (k !== correctKey) {
          errDiv.textContent = "✗  Wrong key — please press the correct key";
          jsPsych.getCurrentTrial().data.error = true;
        } else {
          done = true;
          document.removeEventListener("keydown", handler);
          jsPsych.getCurrentTrial().data.rt = rt;
          jsPsych.getCurrentTrial().data.error =
            jsPsych.getCurrentTrial().data.error || false;
          jsPsych.finishTrial();
        }
      }
      document.addEventListener("keydown", handler);
    },
  };
}

function buildCombinedBlock(blockNum, mixedLeft, nTrials) {
  const LT = mixedLeft ? "Culturally Mixed"   : "Non-Mixed";
  const LS = mixedLeft ? "— or — Cyclical Time" : "— or — Cyclical Time";
  const RT = mixedLeft ? "Non-Mixed"           : "Culturally Mixed";
  const RS = mixedLeft ? "— or — Linear Time"  : "— or — Linear Time";

  const imgLeft  = IMAGES.filter(i => mixedLeft ? i.type==="mixed" : i.type==="nonmixed");
  const imgRight = IMAGES.filter(i => mixedLeft ? i.type==="nonmixed" : i.type==="mixed");

  const pool = shuffle([
    ...imgLeft.map(s  => ({ s, k: KEY_LEFT  })),
    ...imgRight.map(s => ({ s, k: KEY_RIGHT })),
    ...WORDS_CYCLIC.map(s => ({ s, k: KEY_LEFT  })),
    ...WORDS_LINEAR.map(s => ({ s, k: KEY_RIGHT })),
  ]);

  const extended = [];
  while (extended.length < nTrials) extended.push(...pool);
  return shuffle(extended).slice(0, nTrials)
    .map(({s, k}) => makeTrial(LT, LS, RT, RS, s, k, blockNum,
                               mixedLeft ? "congruent" : "incongruent"));
}

// ── INIT ─────────────────────────────────────────────────────────
const jsPsych = initJsPsych({
  on_finish: function() {
    // ---- save data via DataPipe (optional — add your pipeline ID below) ----
    // const data = jsPsych.data.get().csv();
    // fetch("https://pipe.jspsych.org/api/data", { method:"POST", ... });
    console.log(jsPsych.data.get().csv());
    window.location.href = PROLIFIC_REDIRECT;
  }
});

const tl = [];

// preload
tl.push({ type: jsPsychPreload, images: IMAGES.map(i => i.src) });

// counterbalance: congruent-first vs incongruent-first
const congruentFirst = Math.random() < 0.5;

// ── BLOCK 1: image practice (20 trials) ──────────────────────────
tl.push({
  type: jsPsychHtmlKeyboardResponse,
  choices: "ALL_KEYS",
  stimulus: `<div class="instr-box">
    <h2>Block 1 of 7 — Image Practice</h2>
    <p>You will see <b>product images</b> one at a time.</p>
    <p>Press <span class="key-eg">E</span> if the image shows a <b>Culturally Mixed</b> product.<br>
       Press <span class="key-eg">I</span> if the image shows a <b>Non-Mixed</b> product.</p>
    <p style="color:#888;font-size:15px">Press any key to begin.</p>
  </div>`
});
const b1pool = shuffle([
  ...IMAGES.filter(i=>i.type==="mixed").map(s=>({s,k:KEY_LEFT})),
  ...IMAGES.filter(i=>i.type==="nonmixed").map(s=>({s,k:KEY_RIGHT})),
  ...IMAGES.filter(i=>i.type==="mixed").map(s=>({s,k:KEY_LEFT})),
  ...IMAGES.filter(i=>i.type==="nonmixed").map(s=>({s,k:KEY_RIGHT})),
]).slice(0,20);
b1pool.forEach(({s,k}) => tl.push(
  makeTrial("Culturally Mixed","","Non-Mixed","",s,k,1,"img_practice")
));

// ── BLOCK 2: word practice (20 trials) ───────────────────────────
tl.push({
  type: jsPsychHtmlKeyboardResponse,
  choices: "ALL_KEYS",
  stimulus: `<div class="instr-box">
    <h2>Block 2 of 7 — Word Practice</h2>
    <p>You will see <b>words</b> one at a time.</p>
    <p>Press <span class="key-eg">E</span> for <b>Cyclical Time</b> words
       (time as cycles, recurrence, return).<br>
       Press <span class="key-eg">I</span> for <b>Linear Time</b> words
       (time moving forward in one direction).</p>
    <p style="color:#888;font-size:15px">Press any key to begin.</p>
  </div>`
});
const b2pool = shuffle([
  ...WORDS_CYCLIC.map(s=>({s,k:KEY_LEFT})),
  ...WORDS_LINEAR.map(s=>({s,k:KEY_RIGHT})),
  ...WORDS_CYCLIC.map(s=>({s,k:KEY_LEFT})),
  ...WORDS_LINEAR.map(s=>({s,k:KEY_RIGHT})),
]).slice(0,20);
b2pool.forEach(({s,k}) => tl.push(
  makeTrial("Cyclical Time","","Linear Time","",s,k,2,"word_practice")
));

// ── BLOCKS 3–7 with counterbalancing ─────────────────────────────
function instrBlock(num, title, leftTop, leftSub, rightTop, rightSub, extra) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    choices: "ALL_KEYS",
    stimulus: `<div class="instr-box">
      <h2>Block ${num} of 7 — ${title}</h2>
      ${extra || ""}
      <p>Press <span class="key-eg">E</span> for <b>${leftTop}</b>${leftSub ? " "+leftSub : ""}.<br>
         Press <span class="key-eg">I</span> for <b>${rightTop}</b>${rightSub ? " "+rightSub : ""}.</p>
      <p style="color:#888;font-size:15px">Press any key to begin.</p>
    </div>`
  };
}

// Block 3 = 20-trial combined practice
// Block 4 = 20-trial image reversal practice
// Block 5 = 20-trial combined practice (reversed)
// Block 6 = 40-trial combined test
// Block 7 = 40-trial combined test (same pairing as 6)

function addCongruentFirst() {
  // Block 3: mixed+cyclic = left
  tl.push(instrBlock(3,"Combined Practice",
    "Culturally Mixed","or Cyclical Time",
    "Non-Mixed","or Linear Time"));
  tl.push(...buildCombinedBlock(3, true, 20));

  // Block 4: image reversal
  tl.push(instrBlock(4,"Image Reversal Practice",
    "Non-Mixed","","Culturally Mixed","",
    "<p>⚠️ The image categories have <b>switched sides</b>.</p>"));
  const b4pool = shuffle([
    ...IMAGES.filter(i=>i.type==="nonmixed").map(s=>({s,k:KEY_LEFT})),
    ...IMAGES.filter(i=>i.type==="mixed").map(s=>({s,k:KEY_RIGHT})),
    ...IMAGES.filter(i=>i.type==="nonmixed").map(s=>({s,k:KEY_LEFT})),
    ...IMAGES.filter(i=>i.type==="mixed").map(s=>({s,k:KEY_RIGHT})),
  ]).slice(0,20);
  b4pool.forEach(({s,k}) => tl.push(
    makeTrial("Non-Mixed","","Culturally Mixed","",s,k,4,"img_reversal")
  ));

  // Block 5: non-mixed+cyclic = left (incongruent)
  tl.push(instrBlock(5,"Reversed Combined Practice",
    "Non-Mixed","or Cyclical Time",
    "Culturally Mixed","or Linear Time",
    "<p>⚠️ The image categories have <b>switched sides</b>.</p>"));
  tl.push(...buildCombinedBlock(5, false, 20));

  // Block 6 & 7: incongruent test (40 trials each)
  tl.push(instrBlock(6,"Combined Test",
    "Non-Mixed","or Cyclical Time",
    "Culturally Mixed","or Linear Time"));
  tl.push(...buildCombinedBlock(6, false, 40));

  tl.push(instrBlock(7,"Final Test",
    "Non-Mixed","or Cyclical Time",
    "Culturally Mixed","or Linear Time"));
  tl.push(...buildCombinedBlock(7, false, 40));
}

function addIncongruentFirst() {
  // Block 3: non-mixed+cyclic = left (incongruent first)
  tl.push(instrBlock(3,"Combined Practice",
    "Non-Mixed","or Cyclical Time",
    "Culturally Mixed","or Linear Time"));
  tl.push(...buildCombinedBlock(3, false, 20));

  // Block 4: image reversal back to mixed=left
  tl.push(instrBlock(4,"Image Reversal Practice",
    "Culturally Mixed","","Non-Mixed","",
    "<p>⚠️ The image categories have <b>switched sides</b>.</p>"));
  const b4pool = shuffle([
    ...IMAGES.filter(i=>i.type==="mixed").map(s=>({s,k:KEY_LEFT})),
    ...IMAGES.filter(i=>i.type==="nonmixed").map(s=>({s,k:KEY_RIGHT})),
    ...IMAGES.filter(i=>i.type==="mixed").map(s=>({s,k:KEY_LEFT})),
    ...IMAGES.filter(i=>i.type==="nonmixed").map(s=>({s,k:KEY_RIGHT})),
  ]).slice(0,20);
  b4pool.forEach(({s,k}) => tl.push(
    makeTrial("Culturally Mixed","","Non-Mixed","",s,k,4,"img_reversal")
  ));

  // Block 5: mixed+cyclic = left (congruent)
  tl.push(instrBlock(5,"Reversed Combined Practice",
    "Culturally Mixed","or Cyclical Time",
    "Non-Mixed","or Linear Time",
    "<p>⚠️ The image categories have <b>switched sides</b>.</p>"));
  tl.push(...buildCombinedBlock(5, true, 20));

  // Block 6 & 7: congruent test (40 trials each)
  tl.push(instrBlock(6,"Combined Test",
    "Culturally Mixed","or Cyclical Time",
    "Non-Mixed","or Linear Time"));
  tl.push(...buildCombinedBlock(6, true, 40));

  tl.push(instrBlock(7,"Final Test",
    "Culturally Mixed","or Cyclical Time",
    "Non-Mixed","or Linear Time"));
  tl.push(...buildCombinedBlock(7, true, 40));
}

if (congruentFirst) {
  addCongruentFirst();
} else {
  addIncongruentFirst();
}

// ── POST-IAT: familiarity control variable ────────────────────────
tl.push({
  type: jsPsychHtmlKeyboardResponse,
  choices: "ALL_KEYS",
  stimulus: `<div class="instr-box">
    <h2>Almost done!</h2>
    <p>Please answer a few brief questions.</p>
    <p style="color:#888;font-size:15px">Press any key to continue.</p>
  </div>`
});

tl.push({
  type: jsPsychSurveyLikert,
  questions: [
    {
      prompt: "How familiar were you with the <b>cultural elements</b> shown in the product images?",
      labels: ["1<br>Not at all","2","3","4","5","6","7<br>Extremely"],
      required: true, name: "familiarity_culture"
    },
    {
      prompt: "How familiar were you with the <b>product types</b> shown in this study?",
      labels: ["1<br>Not at all","2","3","4","5","6","7<br>Extremely"],
      required: true, name: "familiarity_products"
    },
  ],
  data: { trial_type_iat: "familiarity" }
});

// ── DEMOGRAPHICS ──────────────────────────────────────────────────
tl.push({
  type: jsPsychSurveyLikert,
  questions: [
    {
      prompt: "Your age group:",
      labels: ["18–24","25–34","35–44","45–54","55–64","65+"],
      required: true, name: "age"
    },
    {
      prompt: "Your gender:",
      labels: ["Male","Female","Non-binary / third gender","Prefer not to say"],
      required: true, name: "gender"
    },
    {
      prompt: "Have you ever lived in an East Asian country for 6 months or more?",
      labels: ["No","Yes"],
      required: true, name: "east_asia_exp"
    },
  ],
  data: { trial_type_iat: "demographics" }
});

// ── END ───────────────────────────────────────────────────────────
tl.push({
  type: jsPsychHtmlKeyboardResponse,
  choices: "ALL_KEYS",
  stimulus: `<div class="instr-box">
    <h2>Thank you!</h2>
    <p>You have completed the study.</p>
    <p>You will now be redirected to Prolific to confirm your submission.</p>
    <p style="color:#888;font-size:15px">Press any key to continue.</p>
  </div>`
});

jsPsych.run(tl);
</script>
</body>
</html>
